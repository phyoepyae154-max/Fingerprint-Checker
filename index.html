<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahhtann Registration</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fingerprintjs2/2.1.0/fingerprint2.min.js"></script>
    <style>
        body { background-color: #000; color: #ff3366; font-family: 'Pyidaungsu', sans-serif; text-align: center; padding: 30px; }
        .input-box { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #ff3366; background: #1a1a1a; color: white; }
        .reg-btn { background: linear-gradient(45deg, #ff3366, #ff00cc); color: white; padding: 15px 40px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>🫦 မောင်လေး... Register လုပ်ပါ</h3>
    <p style="color: #eee;">အကောင့်ဖွင့်ပြီး ငွေရှာဖို့ နာမည်ရိုက်ထည့်ပါရှင်။</p>
    
    <div id="loading">Device စစ်ဆေးနေသည်... ⏳</div>
    
    <div id="form-container" style="display:none;">
        <input type="text" id="username" class="input-box" placeholder="မင်းရဲ့နာမည်အမှန်...">
        <button onclick="submitReg()" class="reg-btn">REGISTER NOW</button>
        <div id="status">Device ID: <span id="fp-id">စစ်ဆေးနေဆဲ...</span></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Screen အပြည့်ချဲ့မယ်
        let finalFingerprint = "";

        // Fingerprint ထုတ်ယူခြင်း Logic
        if (window.requestIdleCallback) {
            requestIdleCallback(function () {
                Fingerprint2.get(function (components) {
                    finalFingerprint = Fingerprint2.x64hash128(components.map(function (p) { return p.value }).join(), 31);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('form-container').style.display = 'block';
                    document.getElementById('fp-id').innerText = finalFingerprint;
                });
            });
        }

        function submitReg() {
            let name = document.getElementById('username').value;
            if (name.length < 2) { 
                alert("နာမည်အမှန် ထည့်ပေးပါရှင်။"); 
                return; 
            }

            // Telegram Bot ဆီကို JSON data ပို့မယ်
            let payload = {
                action: "register",
                name: name,
                fingerprint: finalFingerprint
            };

            // အရေးကြီးဆုံးအပိုင်း: ဒီ command က Bot ထဲက on_web_app_data ကို လှမ်းခေါ်တာပါ
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }
    </script>
</body>
</html>
